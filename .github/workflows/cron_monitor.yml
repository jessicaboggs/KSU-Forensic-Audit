name: Automated KSU Counter-Spoliation Tracker

on:
  schedule:
    - cron: '0 12 * * *' # Executes automatically every single day at 12:00 UTC (8:00 AM EST)
  workflow_dispatch:     # Allows you to manually trigger the scanner loop with 1 click from GitHub

jobs:
  inspect-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository Graph
        uses: actions/checkout@v3

      - name: Initialize Python Core Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Live Counter-Spoliation Scanner
        run: python3 apa_compliance_check.py

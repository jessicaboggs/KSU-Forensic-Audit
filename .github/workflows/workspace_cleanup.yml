name: KSU Forensic Watchdog Pipeline

on:
  schedule:
    - cron: '0 5 * * *' # Triggers automatically every night at 1:00 AM EST
  workflow_dispatch: # Allows manual trigger button in GitHub UI

jobs:
  run-forensic-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Step 1 - Scrape Official Newsroom Claims
      run: python parse_newsroom.py

    - name: Step 2 - Calculate Discrepancy Metrics
      run: python ksu_lie_counter.py

    - name: Step 2.5 - Run OPE ID Leak Tracer Matrix
      run: python ksu_opeid_leak_tracer.py

    - name: Step 2.75 - Run NCES IPEDS Data Compliance Validator
      run: python ksu_ipeds_validator.py

    - name: Step 3 - Inject Frontend Markdown Dashboard
      run: python update_dashboard.py

    - name: Step 4 - Commit and Push Updates Securely
      run: |
        git config --global user.name "KSU Forensic Watchdog Bot"
        git config --global user.email "watchdog-bot@://github.com"
        git add README.md data_layers/official_claims.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-Update: Synchronized newsroom claims matrix & scorecard metrics" && git push)

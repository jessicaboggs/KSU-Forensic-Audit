name: KSU Audit Workspace Hard Reset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Graph
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deep Clean Untracked and Generated Files
        run: |
          echo "Starting aggressive workspace purge..."
          rm -f *.log
          git clean -fdx
          echo "Workspace successfully wiped clean."

      - name: Verify Clean Slate
        run: |
          echo "Checking remaining files:"
          ls -la

      - name: Commit and Push Cleanup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated workspace purge and cleanup"
            git push
          else
            echo "No tracked files were altered; repository is completely clean."
          fi
